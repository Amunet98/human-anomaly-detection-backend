databases:
  - name: anomaly-detection-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: human-anomaly-detection-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anomaly-detection-db
          property: connectionString
      - key: CLASS_NAMES
        value: "fall,sit,stand"
      - key: DETECTION_CONFIDENCE
        value: "0.4"
